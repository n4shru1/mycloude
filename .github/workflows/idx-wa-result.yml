name: IDX WA Result

# Jadwal identik dengan crontab VPS: 0 11 * * 2-6 (waktu UTC)
on:
  schedule:
    - cron: '0 11 * * 2-6'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance requests
      - name: Kirim WA result
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          WA_TEST_OVERRIDE: ${{ secrets.WA_TEST_OVERRIDE }}
        run: python3 scripts/trading/wa_result.py
