name: IDX WA Result

# ~19:00 WITA Selasa-Sabtu (waktu UTC). Menit digeser dari :00.
on:
  schedule:
    - cron: '8 11 * * 2-6'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance requests
      - name: Kirim WA result
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
        run: python3 scripts/trading/wa_result.py
