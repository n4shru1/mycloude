name: IDX Analyze Trades

# ~10:00 WITA Sabtu (waktu UTC). Menit digeser dari :00.
on:
  schedule:
    - cron: '11 2 * * 6'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Analyze trades
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
        run: python3 scripts/trading/analyze_trades.py
