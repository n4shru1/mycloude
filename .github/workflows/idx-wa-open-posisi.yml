name: IDX WA Open Posisi

# ~22:30 WITA Senin-Jumat (waktu UTC). Menit digeser dari :30.
on:
  schedule:
    - cron: '37 14 * * 1-5'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Kirim WA open posisi
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
        run: python3 scripts/trading/wa_open_posisi.py
