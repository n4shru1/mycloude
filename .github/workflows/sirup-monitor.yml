name: SiRUP Monitor

# DIMATIKAN: dipindah kembali ke cron VPS (bukan lagi cloud) per keputusan
# user 2026-07-09. workflow_dispatch tetap aktif untuk tes manual.
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
      WA_TEST_OVERRIDE: ${{ secrets.WA_TEST_OVERRIDE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright requests
      - run: playwright install --with-deps chromium
      - name: SiRUP Sulsel & Sulbar
        run: python3 scripts/sirup/sirup_sulsel_sulbar.py
      - name: SiRUP Sulut
        run: python3 scripts/sirup/sirup_monitor_sulut.py
      - name: SiRUP Ternate
        run: python3 scripts/sirup/sirup_monitor_ternate.py
      - name: SiRUP Surabaya
        run: python3 scripts/sirup/sirup_surabaya.py
