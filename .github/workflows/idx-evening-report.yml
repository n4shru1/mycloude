name: IDX Evening Report

# Jadwal identik dengan crontab VPS: 0 10 * * 1-5 (waktu UTC)
# Murni perhitungan teknikal (yfinance) — tidak butuh AI.
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance
      - name: Generate evening report
        run: python3 scripts/trading/idx_evening_report.py
      - name: Commit report file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trading/
          git diff --staged --quiet && exit 0
          git commit -m "IDX evening report [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
