name: Update Proyek Ongoing

# DIMATIKAN: dipindah kembali ke cron VPS (bukan lagi cloud) per keputusan
# user 2026-07-09. workflow_dispatch tetap aktif untuk tes manual.
on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run update proyek ongoing
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          ADHITAMA_USERNAME: ${{ secrets.ADHITAMA_USERNAME }}
          ADHITAMA_PASSWORD: ${{ secrets.ADHITAMA_PASSWORD }}
        run: python3 scripts/proyek/proyek_ongoing.py
