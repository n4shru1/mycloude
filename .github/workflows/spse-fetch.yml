name: SPSE Fetch (Fase 1)

# ~21:32 WITA Senin-Sabtu (waktu UTC), sebelum Routine spse-monitor-harian
# jalan (~22:06 WITA). spse.inaproc.id memblokir IP cloud Claude (403 dari
# Cloudflare), tapi tidak memblokir GitHub Actions runner -- jadi scraping
# murni (tanpa AI) dipindah ke sini. Routine cuma baca hasilnya untuk Fase 2
# (baca PDF pakai vision) dan Fase 3 (kirim WA).
on:
  schedule:
    - cron: '32 13 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pdfminer.six playwright
      - run: playwright install --with-deps chromium
      - name: Diagnostic - check spse.inaproc.id via Playwright (bypass Cloudflare JS challenge?)
        run: |
          python3 -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              resp = page.goto('https://spse.inaproc.id/', timeout=30000, wait_until='networkidle')
              print('status:', resp.status if resp else None)
              print('title:', page.title())
              print(page.content()[:500])
              browser.close()
          "
      - name: Diagnostic - check spse.inaproc.id reachability (plain curl, for comparison)
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" https://spse.inaproc.id/ || true
      - name: Diagnostic - check data.inaproc.id (new INAPROC API Gateway) reachability
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" https://data.inaproc.id/ || true
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" https://data.inaproc.id/docs/dokumentasi/guides/migration-from-isb || true
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" https://isb.lkpp.go.id/isb-2 || true
      - name: Diagnostic - inspect isb.lkpp.go.id/isb-2 page content
        run: |
          curl -sS https://isb.lkpp.go.id/isb-2 | head -c 3000
          echo ""
          echo "--- try public tender endpoint without token ---"
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" "https://isb.lkpp.go.id/isb-2/api/satudata/TenderUmumPublik" || true
          curl -sS "https://isb.lkpp.go.id/isb-2/api/satudata/TenderUmumPublik" | head -c 1000
          echo ""
      - name: Fetch SPSE data (Fase 1)
        run: python3 scripts/spse/phase1_fetch.py data/spse/spse_pdf_cache.json data/spse/state.json data/spse/pdfs
      - name: Commit fetched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/spse/spse_pdf_cache.json data/spse/state.json data/spse/pdfs
          git diff --staged --quiet && exit 0
          git commit -m "SPSE fetch: update cache + state [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main && exit 0
            sleep $((RANDOM % 5 + 1))
          done
          echo "Push failed after retries" && exit 1
