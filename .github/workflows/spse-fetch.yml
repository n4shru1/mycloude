name: SPSE Fetch (Fase 1)

# NONAKTIF SEMENTARA (jadwal dimatikan): spse.inaproc.id memblokir semua IP
# cloud yang dicoba (Anthropic, GitHub Actions polos, GitHub Actions +
# Playwright/browser asli) dengan 403 dari Cloudflare -- terbukti berbasis
# reputasi IP/ASN, bukan sesuatu yang bisa diakali dari kode. VPS terbukti
# tidak diblokir. isb.lkpp.go.id (API resmi lama) bisa diakses tapi minta
# login akun terdaftar + CAPTCHA, bukan celah gratis.
# Menunggu keputusan: VPS ringan / proxy residential berbayar / daftar akses
# resmi ISB ke LKPP. workflow_dispatch tetap aktif untuk tes ulang manual
# kalau blokirnya suatu saat dicabut atau ada solusi baru.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pdfminer.six
      - name: Fetch SPSE data (Fase 1)
        run: python3 scripts/spse/phase1_fetch.py data/spse/spse_pdf_cache.json data/spse/state.json data/spse/pdfs
      - name: Commit fetched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/spse/spse_pdf_cache.json data/spse/state.json data/spse/pdfs
          git diff --staged --quiet && exit 0
          git commit -m "SPSE fetch: update cache + state [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main && exit 0
            sleep $((RANDOM % 5 + 1))
          done
          echo "Push failed after retries" && exit 1
