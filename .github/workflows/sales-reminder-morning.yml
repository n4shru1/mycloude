name: Sales Reminder - Morning

# Waktu UTC, WITA = UTC+8. Sekitar 09:00 WITA, Senin-Kamis & Sabtu.
# Menit digeser dari :00 (bukan angka bulat) sesuai saran GitHub untuk
# mengurangi antrian di scheduled workflow -- lihat README/riwayat commit.
# Catatan: Jumat pagi memang tidak ada di crontab asli (kemungkinan celah, bukan diubah oleh migrasi ini).
on:
  schedule:
    - cron: '4 1 * * 1-4'
    - cron: '4 1 * * 6'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests openpyxl
      - name: Run sales reminder (morning)
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          ADHITAMA_WEB_TOKEN: ${{ secrets.ADHITAMA_WEB_TOKEN }}
          ONEDRIVE_SURABAYA_MONITORING: ${{ secrets.ONEDRIVE_SURABAYA_MONITORING }}
          ONEDRIVE_SURABAYA_REKAP: ${{ secrets.ONEDRIVE_SURABAYA_REKAP }}
          ONEDRIVE_MANADO_MONITORING: ${{ secrets.ONEDRIVE_MANADO_MONITORING }}
          ONEDRIVE_MANADO_REKAP: ${{ secrets.ONEDRIVE_MANADO_REKAP }}
          ONEDRIVE_MAKASSAR_MONITORING: ${{ secrets.ONEDRIVE_MAKASSAR_MONITORING }}
          ONEDRIVE_MAKASSAR_REKAP: ${{ secrets.ONEDRIVE_MAKASSAR_REKAP }}
        run: python3 scripts/sales/sales_reminder.py morning
