name: IDX Morning Plan

# ~06:00 WITA Senin-Jumat (waktu UTC). Menit digeser dari :00.
# Murni perhitungan teknikal (yfinance) — tidak butuh AI.
on:
  schedule:
    - cron: '6 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy
      - name: Generate morning plan
        run: python3 scripts/trading/idx_morning_plan.py
      - name: Commit plan files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trading/
          git diff --staged --quiet && exit 0
          git commit -m "IDX morning plan [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main && exit 0
            sleep $((RANDOM % 5 + 1))
          done
          echo "Push failed after retries" && exit 1
