name: IDX Morning Plan

# Jadwal identik dengan crontab VPS: 0 22 * * 0-4 (waktu UTC)
# Murni perhitungan teknikal (yfinance) — tidak butuh AI.
on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy
      - name: Generate morning plan
        run: python3 scripts/trading/idx_morning_plan.py
      - name: Commit plan files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trading/
          git diff --staged --quiet || git commit -m "IDX morning plan [skip ci]"
          git push
