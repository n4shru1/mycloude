name: Laporan Piutang Harian

# Jadwal identik dengan crontab VPS: 3 1 * * 1-5 (waktu UTC)
on:
  schedule:
    - cron: '3 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run laporan piutang
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          WA_TEST_OVERRIDE: ${{ secrets.WA_TEST_OVERRIDE }}
          ADHITAMA_USERNAME: ${{ secrets.ADHITAMA_USERNAME }}
          ADHITAMA_PASSWORD: ${{ secrets.ADHITAMA_PASSWORD }}
        run: python3 scripts/piutang/piutang.py
      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/piutang/
          git diff --staged --quiet && exit 0
          git commit -m "Update piutang cache [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
