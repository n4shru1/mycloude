name: IDX Log Trade

# Jadwal identik dengan crontab VPS: 30 10 * * 1-5 (waktu UTC)
on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance
      - name: Log trade
        run: python3 scripts/trading/log_trade.py
      - name: Commit trade log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trading/trade_log.csv
          git diff --staged --quiet || git commit -m "Update trade log [skip ci]"
          git push
